{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ========== Page Title ========== -->
    <title>{% block title %}Home | {{ site_setting.site_name }}{% endblock %}</title>
    <!-- ========== Favicon ========== -->
    <link rel="icon" href="{% static '' %}assets/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static '' %}assets/css/style.css">
    <script defer src="{% static '' %}assets/js/script.js"></script>
    <script defer src="{% static '' %}assets/js/project.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/js/lightbox.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/flowbite@latest/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/flowbite@latest/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/css/lightbox.min.css" rel="stylesheet" />
    <script src="https://unpkg.com/scrollreveal"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/css/intlTelInput.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/18.2.1/js/intlTelInput.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Lions Special Olympics NGO - Empowering athletes with special abilities through sports and events.">
    <meta name="keywords" content="NGO, Lions Club, Special Olympics, Charity, Sports, Disability Support"> 
  {% block extra_head %}{% endblock %}
</head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@400;500;600;700&display=swap');

  body {
    font-family: 'Poppins', sans-serif;
  }

  .dancing-font {
    font-family: 'Dancing Script', cursive;
  }
.roboto-italic {
  font-family: "Roboto", sans-serif;
  font-optical-sizing: auto;
  font-weight: 100;
  font-style: italic;
  font-variation-settings:
    "wdth" 100;
}
</style>
<body class="bg-[#E8E6F1]">
  
  {% include "includes/_header.html" %}

      {% block content %}{% endblock %}
 
  {% include "includes/_footer.html" %}



<!-- ================ POPUPS START HERE ================ -->

<div id="imagePopupGALLERY" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden flex items-center justify-center z-[9999] transition p-3 sm:p-6">

    <button id="closePopup" class="absolute top-4 right-4 sm:top-6 sm:right-6 text-white text-4xl sm:text-5xl font-bold hover:text-red-500 transition transform hover:scale-110 drop-shadow-xl">
        &times;
    </button>

    <button id="prevBtn" class="absolute z-10 left-3 sm:left-6 top-1/2 -translate-y-1/2 text-white text-4xl sm:text-5xl font-bold px-3 sm:px-4 py-1 sm:py-2 rounded-full bg-black/40 backdrop-blur-md hover:bg-black/70 transition hover:scale-110 shadow-xl">
        &#10094;
    </button>

    <button id="nextBtn" class="absolute z-10 right-3 sm:right-6 top-1/2 -translate-y-1/2 text-white text-4xl sm:text-5xl font-bold px-3 sm:px-4 py-1 sm:py-2 rounded-full bg-black/40 backdrop-blur-md hover:bg-black/70 transition hover:scale-110 shadow-xl">
        &#10095;
    </button>

    <img id="popupImage" class="w-[95%] sm:w-auto max-w-full max-h-[80vh] sm:max-h-[88vh] rounded-2xl shadow-[0_0_40px_rgba(255,255,255,0.2)] border-2 sm:border-4 border-white/90 scale-95 opacity-0 transition-all duration-300 ease-out object-contain">
</div>

<div id="teamModal" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 bg-black/70 backdrop-blur-md">

  <div onclick="closeTeamModal()" class="absolute inset-0"></div>

  <div class="relative w-full max-w-2xl bg-white rounded-3xl shadow-2xl overflow-hidden animate-scaleIn z-10">

    <div class="h-32 bg-gradient-to-r from-indigo-600 to-purple-600"></div>

    <button onclick="closeTeamModal()" class="absolute top-4 right-4 text-white/80 hover:text-white text-2xl">
      ✕
    </button>

    <div class="relative -mt-16 flex justify-center">
      <img id="modalImg" class="w-32 h-32 rounded-full border-4 border-white shadow-xl object-cover bg-white">
    </div>

    <div class="px-8 pb-6 pt-4 text-center">

      <h3 id="modalName" class="text-2xl font-bold text-gray-900"></h3>

      <p id="modalRole" class="text-sm font-medium text-indigo-600 mt-1"></p>

      <div id="modalBio" class="mt-6 text-left text-gray-700 text-sm leading-relaxed max-h-[38vh] overflow-y-auto pr-2 space-y-4">
      </div>

      <button onclick="closeTeamModal()" class="mt-6 inline-flex items-center justify-center gap-2 px-6 py-2 rounded-full bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition">
        Close
      </button>

    </div>
  </div>
</div>

<div id="bioModal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center px-4">
  <div class="bg-white max-w-2xl w-full rounded-xl p-6 relative">

    <button onclick="closeBioModal()"
            class="absolute top-3 right-4 text-gray-600 text-xl">&times;</button>

    <h3 id="modalName" class="text-2xl font-bold mb-2"></h3>
    <p id="modalRole" class="text-red-600 font-medium mb-4"></p>

    <p id="modalBio" class="text-gray-700 text-sm leading-relaxed"></p>
  </div>
</div>

<div id="posterModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">
    
    <button onclick="closeModal()" class="absolute top-6 right-8 text-white text-3xl">×</button>

    <button onclick="prevImage()" class="absolute left-6 text-white text-4xl">❮</button>

    <img id="modalImage" class="max-h-[85vh] shadow-2xl">

    <button onclick="nextImage()" class="absolute right-6 text-white text-4xl">❯</button>

</div>
<!-- ================ POPUPS END HERE ================ -->

<script>
let currentIndex = 0;
let images = [];

document.querySelectorAll(".group img").forEach((img, index) => {
    images.push(img.src);

    img.parentElement.addEventListener("click", () => {
        currentIndex = index;
        document.getElementById("modalImage").src = images[currentIndex];
        document.getElementById("posterModal").classList.remove("hidden");
        document.getElementById("posterModal").classList.add("flex");
    });
});

function closeModal() {
    document.getElementById("posterModal").classList.add("hidden");
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById("modalImage").src = images[currentIndex];
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById("modalImage").src = images[currentIndex];
}
</script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          dancing: ['"Dancing Script"', 'cursive'],
        }
      }
    }
  }
</script>
</body>
</html>
